spring:
  application:
    name: "configserver"
  profiles:
    active: git
  #    active: native
  cloud:
    config:
      server:
#        native:
#          search-locations: "classpath:/config/"
#          search-locations: "file:///D://microservice_spring//config"
        git:
          uri: "https://github.com/longtn213/south-dragon-config"
          username: longtn213
          password:
          default-label: main
          timeout: 5
          clone-on-start: true
          force-pull: true
          search-paths: config
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 8071
encrypt:
  key: