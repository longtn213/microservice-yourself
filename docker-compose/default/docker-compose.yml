name: my-microservices
services:
  redis:
    image: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      timeout: 10s
      retries: 10
    extends:
      file: common-config/common-config.yml
      service: network-deploy-service
  accountsDB:
    container_name: accountsDB
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: accountsDB
    extends:
      file: common-config/common-config.yml
      service: microservice-db-config
  loansDB:
    container_name: loansDB
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: loansDB
    extends:
      file: common-config/common-config.yml
      service: microservice-db-config
  cardsDB:
    container_name: cardsDB
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: cardsDB
    extends:
      file: common-config/common-config.yml
      service: microservice-db-config
  rabbit:
    image: rabbitmq:4-management
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics check_port_connectivity
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    extends:
      file: common-config/common-config.yml
      service: network-deploy-service

  eurekaserver:
    image: longtn213/eurekaserver:s10
    container_name: eurekaserver
    ports:
      - "8070:8070"
    depends_on:
      config-server: { condition: service_healthy }
    healthcheck:
      test: "curl --fail --silent localhost:8070/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    extends:
      file: common-config/common-config.yml
      service: microservice-configserver-config
    environment:
      SPRING_APPLICATION_NAME: eurekaserver

  config-server:
    image: longtn213/configserver:s10
    container_name: configserver-ms
    ports:
      - "8071:8071"
    depends_on:
      rabbit: { condition: service_healthy }
    healthcheck:
      test: "curl --fail --silent localhost:8071/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    extends:
      file: common-config/common-config.yml
      service: microservice-base-config

  accounts:
    image: longtn213/accounts:s10
    container_name: accounts-ms
    ports:
      - "8080:8080"
    depends_on:
      accountsDB: { condition: service_healthy }
    healthcheck:
      test: "curl --fail --silent localhost:8080/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      SPRING_APPLICATION_NAME: accounts
      SPRING_DATASOURCE_URL: jdbc:mysql://accountsDB:3306/accountsDB?useSSL=false&allowPublicKeyRetrieval=true
    extends:
      file: common-config/common-config.yml
      service: microservice-eureka-config

  loans:
    image: longtn213/loans:s10
    container_name: loans-ms
    ports:
      - "8090:8090"
    depends_on:
      loansDB: { condition: service_healthy }
    healthcheck:
      test: "curl --fail --silent localhost:8090/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      SPRING_APPLICATION_NAME: loans
      SPRING_DATASOURCE_URL: jdbc:mysql://loansDB:3306/loansDB?useSSL=false&allowPublicKeyRetrieval=true
    extends:
      file: common-config/common-config.yml
      service: microservice-eureka-config

  cards:
    image: longtn213/cards:s10
    container_name: cards-ms
    ports:
      - "9000:9000"
    depends_on:
      cardsDB: { condition: service_healthy }
    healthcheck:
      test: "curl --fail --silent localhost:9000/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      SPRING_APPLICATION_NAME: cards
      SPRING_DATASOURCE_URL: jdbc:mysql://cardsDB:3306/cardsDB?useSSL=false&allowPublicKeyRetrieval=true
    extends:
      file: common-config/common-config.yml
      service: microservice-eureka-config

  gatewayserver:
    image: longtn213/gatewayserver:s10
    container_name: gatewayserver
    ports:
      - "8072:8072"
    depends_on:
      accounts: { condition: service_healthy }
      loans: { condition: service_healthy }
      cards: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      SPRING_APPLICATION_NAME: gatewayserver
      SPRING_DATA_REDIS_CONNECT_TIMEOUT: 2s
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_TIMEOUT: 1s

    extends:
      file: common-config/common-config.yml
      service: microservice-eureka-config

networks:
  southDragon:
    driver: "bridge"